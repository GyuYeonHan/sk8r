apiVersion: v1
kind: Secret
metadata:
  name: sk8tes-secrets
type: Opaque
stringData:
  # 32-byte base64 key (required)
  # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
  appEncryptionKey: 'REPLACE_WITH_BASE64_32_BYTE_KEY'
  # Keycloak confidential client secret (required)
  keycloakClientSecret: 'REPLACE_WITH_KEYCLOAK_CLIENT_SECRET'
  # Optional dedicated auth session key (32-byte base64). If empty, APP_ENCRYPTION_KEY fallback is used.
  authSessionSecret: 'REPLACE_WITH_BASE64_32_BYTE_KEY'
